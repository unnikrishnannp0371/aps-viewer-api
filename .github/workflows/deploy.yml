- name: Deploy to EC2 via SSM
  run: |
    # Get your EC2 instance ID
    INSTANCE_ID=$(aws ec2 describe-instances \
      --filters "Name=ip-address,Values=13.202.144.70" \
      --query "Reservations[0].Instances[0].InstanceId" \
      --output text)

    echo "Deploying to instance: $INSTANCE_ID"

    # Send deploy command via SSM
    COMMAND_ID=$(aws ssm send-command \
      --instance-ids "$INSTANCE_ID" \
      --document-name "AWS-RunShellScript" \
      --parameters 'commands=[
        "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 308916793471.dkr.ecr.ap-south-1.amazonaws.com",
        "cd /opt/aps-viewer",
        "docker compose --env-file .env.production pull api",
        "docker compose --env-file .env.production up -d --no-deps api",
        "docker compose --env-file .env.production exec -T api bundle exec rails db:migrate",
        "echo Deploy complete!"
      ]' \
      --query "Command.CommandId" \
      --output text)

    echo "Command ID: $COMMAND_ID"

    # Wait for command to finish
    aws ssm wait command-executed \
      --command-id "$COMMAND_ID" \
      --instance-id "$INSTANCE_ID"

    # Get output
    aws ssm get-command-invocation \
      --command-id "$COMMAND_ID" \
      --instance-id "$INSTANCE_ID" \
      --query "StandardOutputContent" \
      --output text