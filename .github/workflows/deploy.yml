name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to EC2 via SSM
        run: |
          set -e

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=13.202.144.70" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Deploying to instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy APS Viewer API" \
            --parameters 'commands=[
              "set -e",
              "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 308916793471.dkr.ecr.ap-south-1.amazonaws.com",
              "cd /opt/aps-viewer",
              "docker compose --env-file .env.production pull api",
              "docker compose --env-file .env.production up -d --no-deps api",
              "docker compose --env-file .env.production run --rm api bundle exec rails db:migrate",
              "echo Deploy complete!"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            echo "Current status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "Deployment succeeded"
              break
            fi

            if [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "Deployment failed"

              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --output json

              exit 1
            fi

            sleep 5
          done

          echo "Deployment logs:"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
